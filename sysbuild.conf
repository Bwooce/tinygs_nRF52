# Sysbuild config for NCS v3.3.0
#
# Disable the deprecated Partition Manager — our flash layout is fully
# DTS-driven via app.overlay. Keeping PM on triggers flashdisk.c errors
# (PM_FOREACH_AFFILIATED_TO_disk macro undefined when per-image PM is off
# but sysbuild PM is on).
SB_CONFIG_PARTITION_MANAGER=n
