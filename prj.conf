# ---------------------------------------------------------------------------
# General Zephyr & Memory Configuration
# ---------------------------------------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Allocate a massive heap to handle the mbedTLS TLS handshake
# The nRF52840 has 256KB RAM. We are giving ~80KB to the general heap.
CONFIG_HEAP_MEM_POOL_SIZE=81920

# ---------------------------------------------------------------------------
# Networking IPv6 & TCP (Required for NAT64 MQTT)
# ---------------------------------------------------------------------------
CONFIG_NETWORKING=y
CONFIG_NET_IPV6=y
CONFIG_NET_IPV4=n
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_POSIX_NAMES=y

# Network buffer sizes (Keep these small to save RAM)
CONFIG_NET_PKT_RX_COUNT=10
CONFIG_NET_PKT_TX_COUNT=10
CONFIG_NET_BUF_RX_COUNT=20
CONFIG_NET_BUF_TX_COUNT=20

# ---------------------------------------------------------------------------
# OpenThread (Minimal Thread Device to save RAM)
# ---------------------------------------------------------------------------
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_OPENTHREAD_MTD=y
CONFIG_OPENTHREAD_MTD_SED=y

# Dummy Network Credentials for PoC
CONFIG_OPENTHREAD_NETWORKKEY="00112233445566778899aabbccddeeff"
CONFIG_OPENTHREAD_CHANNEL=15
CONFIG_OPENTHREAD_PANID=43981
CONFIG_OPENTHREAD_XPANID="1111111122222222"

# Enable DNS and NAT64 for Thread
CONFIG_DNS_RESOLVER=y
CONFIG_OPENTHREAD_DNS_CLIENT=y

# ---------------------------------------------------------------------------
# MQTT & mbedTLS (The Heavy Lifters)
# ---------------------------------------------------------------------------
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_TLS=y

CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=60000

# Aggressive TLS Memory Optimization
# Try to shrink the SSL frame size from 16KB to 4KB (Requires TinyGS server support)
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=4096

# Cipher Suites (Force ECC to save RAM over RSA)
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_ECDSA_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_SECP256R1_ENABLED=y
CONFIG_MBEDTLS_ECDSA_DETERMINISTIC=y

# Note: In nRF Connect SDK, we would enable CONFIG_NRF_SECURITY=y here to 
# leverage the CC310 hardware cryptography cell to offload mbedTLS.
