# ---------------------------------------------------------------------------
# TinyGS nRF52 - Zephyr Configuration
# Board: Heltec T114 (nRF52840 + SX1262)
# Bootloader: Adafruit UF2 (MCUboot DISABLED)
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Bootloader & Flash Partitioning
# ---------------------------------------------------------------------------
# Adafruit UF2 bootloader: MBR+SD at 0x0-0x26000, bootloader at 0xF4000+.
# Application loads at 0x26000, with 0xC6000 (792KB) available.
# FATFS at 0xEC000 (32KB). NOTHING writable above 0xF4000.
# See AGENTS.md Section 7 for full flash layout and safety rules.
CONFIG_BOOTLOADER_MCUBOOT=n
CONFIG_FLASH_LOAD_OFFSET=0x26000
CONFIG_FLASH_LOAD_SIZE=0xbc000

# Disable NCS Partition Manager (we define partitions in app.overlay)
CONFIG_PM=n

# LTO — strip unused code to save flash and RAM
# NCS requires both CONFIG_LTO and CONFIG_ISR_TABLES_LOCAL_DECLARATION
CONFIG_LTO=y
CONFIG_ISR_TABLES_LOCAL_DECLARATION=y

# Base64 encoding for LoRa RX packet payloads
CONFIG_BASE64=y

# Generate UF2 output for Adafruit bootloader flashing
CONFIG_BUILD_OUTPUT_UF2=y

# ---------------------------------------------------------------------------
# General Zephyr & Memory
# ---------------------------------------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y
# iot_log backend uses log_format_func_t_get(LOG_OUTPUT_TEXT) at runtime.
# Force text formatter in so the lookup doesn't return NULL.
CONFIG_LOG_OUTPUT=y
# Default 768 is too small — the text formatter blows it and smashes the stack.
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=2048
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_REBOOT=y

# System heap — Zephyr k_malloc only (C++ new uses picolibc malloc/sbrk).
# Peak measured at 516 bytes. 2KB gives 4x headroom.
# mbedTLS has its own dedicated 40KB heap.
CONFIG_HEAP_MEM_POOL_SIZE=2048

# 32kHz crystal — T114 has LFXO (confirmed by Meshtastic USE_LFXO)
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y

# DCDC converter already enabled by nrf52840dk board Kconfig (SOC_DCDC_NRF52X)

# Per-device power management (enables SPI sleep pin states)
CONFIG_PM_DEVICE=y

# Power down unused RAM banks at boot (~0.3 mA on nRF52840). Powers off
# every section beyond _image_ram_end — i.e. the ~83 KB we're not using
# of the 256 KB physical RAM. Safe because all our buffers (stacks,
# sys_heap, mbedTLS heap) are statically sized at link time so
# _image_ram_end captures the real high-water mark. We don't grow
# newlib's malloc heap at runtime, so RAM_POWER_ADJUST_ON_HEAP_RESIZE
# is not needed.
CONFIG_RAM_POWER_DOWN_LIBRARY=y

# Cap picolibc's malloc arena. Without this, COMMON_LIBC_MALLOC_ARENA_SIZE
# defaults to -1 ("all remaining RAM"), and a runaway allocation could
# hardfault on first access to a powered-down section. 4 KB is comfortable:
# RadioLib `new SX1262` + `new Module` is <1 KB live use today. Watch for
# any future C++ allocation growth — sys_heap stats in the periodic STATUS
# log don't track picolibc malloc, so a regression here would only surface
# as a hardfault at the arena boundary.
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=4096

# Bigger log buffer absorbs steady-state log bursts (e.g., MQTT reconnect
# storms during satellite passes) without dropping. Cost: 12 KB static BSS,
# offset by the matching shrink to the malloc arena cap above — net change
# to _image_ram_end is zero.
#
# NOTE: this does NOT recover the early-boot Config:/USB-active lines from
# setup_usb_storage. Those are dropped at the USB CDC ACM driver level
# (host hasn't opened /dev/ttyACM0 yet, driver write returns error,
# log_backend_uart silently discards). To capture them we'd need a custom
# in-memory deferred dump after DTR-assert — separate task.
CONFIG_LOG_BUFFER_SIZE=16384

# ---------------------------------------------------------------------------
# C++ Support (RadioLib requires C++20)
# ---------------------------------------------------------------------------
CONFIG_CPP=y
CONFIG_STD_CPP20=y
# Picolibc — smaller than full newlib, supports %zu
CONFIG_PICOLIBC=y
# Zephyr JSON library — zero-allocation descriptor-based parsing
CONFIG_JSON_LIBRARY=y
CONFIG_PICOLIBC_IO_FLOAT=y
CONFIG_EXTERNAL_LIBCPP=n

# ---------------------------------------------------------------------------
# GPIO & SPI (SX1262 LoRa Radio)
# ---------------------------------------------------------------------------
CONFIG_SPI=y
CONFIG_GPIO=y
CONFIG_ADC=y
CONFIG_WATCHDOG=y
# NRFX_PWM enables the parent driver; per-instance is selected from DT
# (status="okay") in v3.x. v2.6 also had NRFX_PWM0/1/2/3 explicit per-instance,
# but the parent select via DT works on both.
CONFIG_NRFX_PWM=y
# PWM0 IRQ is registered at runtime via irq_connect_dynamic (C++ can't use IRQ_CONNECT macro).
CONFIG_DYNAMIC_INTERRUPTS=y
# NeoPixel RGB LEDs via SPI2 with dummy SCK pin (P0.09)
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP_SPI=y

# Display (ST7789V TFT, optional — init fails gracefully if not connected)
# SNTP for Doppler compensation — uses OpenThread's built-in SNTP client
# which queries Google NTP (2001:4860:4806:8::) directly over IPv6
CONFIG_OPENTHREAD_SNTP_CLIENT=y

CONFIG_DISPLAY=y
# LVGL won't fit — even stripped to label-only it's 114KB flash (we have 38KB headroom).
# Using custom bitmap font renderer with display_write() instead.


# ---------------------------------------------------------------------------
# USB Composite Device (CDC ACM Console + Mass Storage)
# ---------------------------------------------------------------------------
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="TinyGS Configurator"
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_USB_DEVICE_PID=0x0001

# Serial Console via CDC ACM
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y
CONFIG_USB_CDC_ACM=y
CONFIG_CDC_ACM_DTE_RATE_CALLBACK_SUPPORT=y

# USB Mass Storage (FATFS on internal flash)
CONFIG_USB_MASS_STORAGE=y
CONFIG_MASS_STORAGE_DISK_NAME="NAND"

# ---------------------------------------------------------------------------
# Flash & Filesystem (32KB FATFS for config.json + index.html)
# ---------------------------------------------------------------------------
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FILE_SYSTEM=y
# Auto-format on a blank/erased FATFS partition: handled by
# CONFIG_FS_FATFS_MOUNT_MKFS=y, which Zephyr enables by default and
# selects FS_FATFS_MKFS as a side effect. fs_mount() then attempts
# f_mkfs() unless the caller sets FS_MOUNT_FLAG_NO_FORMAT (opt-out).
# We don't set that flag, so the partition self-heals on first boot.
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVER_FLASH=y
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_LFN_MODE_HEAP=y

# ---------------------------------------------------------------------------
# Persistent config — Zephyr Settings subsystem (NVS-backed)
# ---------------------------------------------------------------------------
# CONFIG_SETTINGS is implicitly enabled by CONFIG_OPENTHREAD_PLATFORM_KEY_REF,
# which OpenThread pulls in for dataset / network-key persistence. Re-stating
# it here used to cause double-registration of the "ot" subtree handler and
# boot-time asserts — leave it inferred. tinygs_config.cpp registers the
# "tgs" subtree alongside OpenThread's "ot" subtree on the shared 8 KB
# storage_partition (see app.overlay). CONFIG_SETTINGS_RUNTIME /
# CONFIG_SETTINGS_NVS are likewise auto-enabled — do not add them here.

# ---------------------------------------------------------------------------
# Networking: IPv6 & TCP (for NAT64 MQTT)
# ---------------------------------------------------------------------------
CONFIG_NETWORKING=y
CONFIG_NET_IPV6=y
CONFIG_NET_IPV4=n
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
# CONFIG_NET_SOCKETS_POSIX_NAMES was removed in Zephyr v3.7. Our code already
# uses the zsock_* prefixed names everywhere (verified by grep — no bare
# socket()/setsockopt()/etc. without the zsock_ prefix), so we don't need
# the legacy POSIX-name wrapper.

# Network buffers — TLS handshake over 6LoWPAN needs more buffers
# (small counts caused TLS socket EHOSTUNREACH over OpenThread)
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32

# ---------------------------------------------------------------------------
# OpenThread (Minimal Thread Device - Sleepy End Device)
# ---------------------------------------------------------------------------
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_OPENTHREAD_MTD=y
# SED disabled for Phase 1 testing — stays awake to avoid poll timing issues
# CONFIG_OPENTHREAD_MTD_SED=y

# Thread credentials: obtained via Joiner commissioning (no hardcoded values)
# The commissioner on the OTBR provides the network key, channel, PAN ID, etc.
# Run: ot-ctl commissioner joiner add '*' TNYGS2026NRF

# OpenThread network integration with Zephyr
CONFIG_OPENTHREAD_PLATFORM_NETIF=y
CONFIG_OPENTHREAD_SLAAC=y
# Thread 1.2 Multicast Listener Registration — tells the Backbone Border
# Router (BBR) we want ff05::e510 forwarded from the LAN into the mesh.
# Without this we rely on default-flood behavior, which breaks silently
# when our mesh link gets weak. OpenThread stack handles periodic refresh
# automatically once enabled.
CONFIG_OPENTHREAD_MLR=y
# Child Supervision is compiled-in by default in OpenThread 1.3+:
#   INTERVAL=129 s        (parent→child keepalive cadence)
#   CHECK_TIMEOUT=190 s   (child re-attaches if silence exceeds this)
# No Kconfig knob is exposed — override via a custom
# openthread-core-zephyr-config.h only if we need a shorter detect.

# DNS & NAT64 for Thread
CONFIG_DNS_RESOLVER=y
CONFIG_OPENTHREAD_DNS_CLIENT=y
CONFIG_OPENTHREAD_SRP_CLIENT=y
CONFIG_OPENTHREAD_PING_SENDER=n

# Disable unused features to save flash
CONFIG_MBEDTLS_X509_CRL_PARSE_C=n
CONFIG_MBEDTLS_X509_CSR_PARSE_C=n
CONFIG_NET_PKT_TIMESTAMP=n
CONFIG_NET_PKT_TXTIME=n
CONFIG_NET_TCP_CONGESTION_AVOIDANCE=n
CONFIG_NET_INTERFACE_NAME=n
# DNS is done via the OpenThread DNS client (otDnsClientResolveIp4Address),
# which picks up the DNS proxy address from Thread netdata at runtime. No
# Zephyr-level DNS_SERVER is needed — each user's OTBR advertises its own.

# OpenThread logging knob — levels: CRIT < WARN < NOTE < INFO < DEBG
# Set CONFIG_OPENTHREAD_DEBUG=n to disable OT logs entirely.
# Levels: CRIT=errors only, WARN=+warnings, NOTE=+state changes,
#          INFO=+packet details, DEBG=+MAC filtered frames
CONFIG_OPENTHREAD_DEBUG=y
CONFIG_OPENTHREAD_LOG_LEVEL_CRIT=y

# ---------------------------------------------------------------------------
# MQTT & mbedTLS
# ---------------------------------------------------------------------------
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_TLS=y
# MQTT keepalive — broker disconnects after 1.5x this with no activity.
# TinyGS ping interval is tied to this value. Tested: 300s and 600s work.
# 600s = 10 min idle tolerance over NAT64. Practical max for TinyGS.
# Lowered 300→90 after observing ~10 Thread-flap-induced half-open MQTT
# sockets over 22 h. At 300 s keepalive dead-socket detection took up to
# ~9 min, losing an estimated 1-2 h/day of begine traffic. 90 s cuts
# that to ~2-3 min. Power cost is negligible since the SX1262 is
# boosted-RX continuous regardless of ping frequency.
CONFIG_MQTT_KEEPALIVE=90
CONFIG_MBEDTLS=y
# mbedTLS needs a dedicated contiguous heap — shared system heap fails
# due to fragmentation during TLS handshake (many small alloc/free cycles).
# 60KB was the original value. Try 40KB to save 20KB.
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=40960

# NCS nrf_security: enable SSL/TLS via PSA crypto API
# CC310 disabled — saves ~70KB flash, Oberon software crypto instead.
# CC310's PSA RSA verify returns INVALID_ARGUMENT and cert DER parsing
# requires the dedicated mbedTLS heap which we keep enabled.
# CONFIG_PSA_CRYPTO_DRIVER_CC3XX=y

# Force mbedTLS to use legacy (non-PSA) crypto for TLS operations.
# The PSA drivers don't support PKCS1v15 RSA signature verification.
# OpenThread uses PSA directly and is not affected by this.
# v3.x: PSA Crypto is the default and v2.6's RSA-verify issue is reportedly
# fixed. Try PSA first (smaller code, hardware-accelerated via CC310). If
# mqtt.tinygs.com TLS handshake breaks, fall back to:
#   CONFIG_MBEDTLS_USE_PSA_CRYPTO=n
#   CONFIG_MBEDTLS_LEGACY_CRYPTO_C=y
# PSA_WANT_* enables crypto algorithms; in v3.3 this also drives the
# MBEDTLS_HAS_RSA_CIPHERSUITE_REQUIREMENTS gate, so ECDHE-RSA key exchange
# becomes available without explicit MBEDTLS_KEY_EXCHANGE_* settings.
CONFIG_MBEDTLS_TLS_LIBRARY=y
CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=8192
CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096
CONFIG_PSA_WANT_ALG_ECDH=y
CONFIG_PSA_WANT_ALG_ECDSA=y
CONFIG_PSA_WANT_ALG_SHA_384=y
CONFIG_PSA_WANT_ALG_SHA_512=y
CONFIG_PSA_WANT_ALG_RSA_PKCS1V15_SIGN=y
CONFIG_PSA_WANT_ALG_RSA_PKCS1V15_CRYPT=y
CONFIG_PSA_WANT_KEY_TYPE_RSA_PUBLIC_KEY=y
CONFIG_PSA_WANT_KEY_TYPE_RSA_KEY_PAIR_GENERATE=n
CONFIG_PSA_WANT_RSA_KEY_SIZE_2048=y

# OpenThread forces SSL_TLS_C=n and SSL_CLI_C=n unless Joiner/Commissioner/CoAPS
# is enabled (see ncs/nrf/subsys/net/openthread/Kconfig.defconfig:202-212).
# Enable Joiner to unlock the mbedTLS SSL library for MQTT-TLS.
# Joiner is also useful for proper Thread commissioning in production.
CONFIG_OPENTHREAD_JOINER=y
CONFIG_OPENTHREAD_JOINER_AUTOSTART=y
CONFIG_OPENTHREAD_JOINER_PSKD="TNYGS2026NRF"

# TLS socket support (required for MQTT-TLS)
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_TLS_CREDENTIALS=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=4

# Disable RFC6528 TCP ISN generation (avoids mbedTLS MD5 dependency)
CONFIG_NET_TCP_ISN_RFC6528=n

# Network debug logging — disable for production to save flash
# CONFIG_MQTT_LOG_LEVEL_DBG=y
# CONFIG_NET_SOCKETS_LOG_LEVEL_DBG=y
# CONFIG_NET_LOG=y
# CONFIG_MBEDTLS_LOG_LEVEL_DBG=y
# CONFIG_MBEDTLS_DEBUG=y


# ---------------------------------------------------------------------------
# Remote Logging (IoT Log multicast over Thread IPv6)
# ---------------------------------------------------------------------------
CONFIG_IOT_LOG=y

# ---------------------------------------------------------------------------
# Debug Safety Checks (disable for production to save flash/RAM)
# ---------------------------------------------------------------------------
# Stack overflow detection — MPU_STACK_GUARD is automatically enabled when
# the MPU is available (Cortex-M4F has one) and provides better detection
# than the sentinel. STACK_SENTINEL is mutually exclusive with MPU_STACK_GUARD.
# CONFIG_STACK_SENTINEL=y
# Buffer overflow detection in libc (memcpy, snprintf, etc.)
CONFIG_FORTIFY_SOURCE_RUN_TIME=y

# ---------------------------------------------------------------------------
# RAM Profiling (Phase 1 PoC)
# ---------------------------------------------------------------------------
CONFIG_KERNEL_MEM_POOL=y
CONFIG_SYS_HEAP_RUNTIME_STATS=y
# Thread analyzer — disable for production to save flash/RAM
# CONFIG_THREAD_ANALYZER=y
# CONFIG_THREAD_ANALYZER_AUTO=y
CONFIG_THREAD_NAME=y
# Stack usage tracking — fills stacks with 0xAA at creation, measures unused
CONFIG_INIT_STACKS=y
CONFIG_THREAD_STACK_INFO=y
